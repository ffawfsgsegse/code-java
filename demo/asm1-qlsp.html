<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .card { border: none; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4 text-success font-weight-bold">QUẢN LÝ SẢN PHẨM</h2>

    <div class="card mb-4">
        <div class="card-header bg-success text-white">Thêm Sản Phẩm Mới</div>
        <div class="card-body">
            <form id="productForm" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Mã sản phẩm (SKU)</label>
                    <input type="text" id="sku" class="form-control" placeholder="Ví dụ: SP001" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Tên sản phẩm</label>
                    <input type="text" id="productName" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Giá nhập</label>
                    <input type="number" id="importPrice" class="form-control" placeholder="0" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Giá bán</label>
                    <input type="number" id="exportPrice" class="form-control" placeholder="0" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Link hình ảnh (URL)</label>
                    <input type="text" id="image" class="form-control" placeholder="https://...">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Mô tả chi tiết</label>
                    <textarea id="description" class="form-control" rows="1"></textarea>
                </div>
                <div class="col-12 text-end">
                    <button type="button" onclick="addProduct()" class="btn btn-success px-4">Lưu Sản Phẩm</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover bg-white">
            <thead class="table-light">
                <tr>
                    <th>SKU</th>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá nhập</th>
                    <th>Giá bán</th>
                    <th>Mô tả</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                </tbody>
        </table>
    </div>
</div>
<a href="asm1-qltk.html">
    ← Module Quản Lý Tài Khoản (User Management)

</a>
<script src="asm1-qlsp.js"></script>
</body>
</html>
