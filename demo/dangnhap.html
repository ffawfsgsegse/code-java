<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Nhập</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <h2>Đăng Nhập</h2>
            <div class="input-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="tk" name="username" placeholder="Nhập tên đăng nhập" required>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="mk" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <a a href="asm1-qlsp.html">
            <button type="button" id="ok" class="login-btn" >Đăng Nhập</button>
            </a>
            <div class="options">
                <a href="#">Quên mật khẩu?</a>
                <span>Chưa có tài khoản? <a href="dangky.html">Đăng ký</a></span>
            </div>
        </form>
    </div>
    <script src="dangnhap.js"></script>
</body>
</html>
